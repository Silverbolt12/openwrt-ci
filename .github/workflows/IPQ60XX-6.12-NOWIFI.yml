name: IPQ60XX-6.12-NOWIFI-ZN_M2

on:
  workflow_dispatch:
  schedule:
    - cron: 00 12 1 * *

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/ipq60xx-6.12apk.config
  DIY_SCRIPT: libwrt.sh
  CACHE_TOOLCHAIN: true
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: ZN_M2-6.12-Pure
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "--------------------------CPU信息--------------------------"
        echo "核心数量：$(nproc)"
        echo "--------------------------磁盘信息--------------------------"
        df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq install dos2unix libfuse-dev
        sudo timedatectl set-timezone "$TZ"

    - name: Maximize Build Space(释放磁盘空间)
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024

    - name: Checkout
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        echo "VERSION_INFO=$(git show -s --date=short --format='作者: %an<br/>时间: %cd<br/>hash: %H')" >> $GITHUB_ENV

    - name: Cache Toolchain(缓存工具链)
      if: env.CACHE_TOOLCHAIN == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: false
        mixkey: ipq60xx-zn_m2-6.12
        prefix: ${{ env.OPENWRT_PATH }}

    - name: Install Feeds(安装feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration(加载自定义配置)
      run: |
        [ -e files ] && mv files $OPENWRT_PATH/files
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        chmod +x $DIY_SCRIPT
        $GITHUB_WORKSPACE/$DIY_SCRIPT
        cd $OPENWRT_PATH
        make defconfig

    - name: Download DL Package(下载DL软件包)
      run: |
        cd $OPENWRT_PATH
        make download -j8
        find dl -size -1024c -delete

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        echo "VERSION_KERNEL=$(find -type f -name "*.manifest" -exec grep -oP '^kernel - \K.*?(?=~|-\d+-)' {} \;)" >> $GITHUB_ENV
        # 打包所有APK插件包
        mkdir -p packages_backup
        find $OPENWRT_PATH/bin/packages/ -name "*.apk" -exec cp {} packages_backup/ \; 2>/dev/null || true
        tar -zcf Packages_All_Plugins.tar.gz packages_backup
        # 整理输出目录
        cp $OPENWRT_PATH/.config build.config
        rm -rf packages_backup packages feeds.buildinfo version.buildinfo config.buildinfo *.manifest
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: R${{ env.DATE }} for ZN_M2
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **OpenWrt Firmware for ZN_M2 (兆能 M2)**
          - 核心：基于 Linux 6.12 内核 & NSS 加速
          - 插件：Passwall, SmartDNS, Lucky, ZeroTier, udpxy
          - 特性：极致精简 (无 WIFI / 无 Docker / 无 USB 驱动)
          - 默认地址: `192.168.2.1` | 密码: `password`
          ---
          ${{ env.VERSION_INFO }}
          内核版本: ${{ env.VERSION_KERNEL }}
