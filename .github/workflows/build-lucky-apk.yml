name: Build Lucky APK for IPQ6000

on:
  workflow_dispatch: # 手动触发

env:
  BASE_URL: https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq60xx/
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo apt update
          # 关键：增加了 zstd 用于解压新的 SDK 格式
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils curl zstd
          sudo timedatectl set-timezone "$TZ"

      - name: Setup OpenWrt SDK (Handle .zst Format)
        run: |
          echo "正在获取适配 IPQ6000 的最新 .zst 格式 SDK..."
          INDEX_DATA=$(curl -sL ${{ env.BASE_URL }})
          
          # 动态匹配：支持最新的 .tar.zst 后缀
          SDK_NAME=$(echo "$INDEX_DATA" | grep -oE 'openwrt-sdk-qualcommax-ipq60xx[^"> ]*tar\.zst' | head -n 1)

          if [ -z "$SDK_NAME" ]; then
            echo "自动匹配失败，尝试匹配旧版 .xz 格式..."
            SDK_NAME=$(echo "$INDEX_DATA" | grep -oE 'openwrt-sdk-qualcommax-ipq60xx[^"> ]*tar\.xz' | head -n 1)
          fi

          if [ -z "$SDK_NAME" ]; then
            echo "无法在服务器上定位 SDK 文件，请检查 URL。"
            exit 1
          fi

          SDK_URL="${{ env.BASE_URL }}${SDK_NAME}"
          echo "最终下载地址: $SDK_URL"
          
          # 下载 SDK
          wget -q "$SDK_URL" -O sdk.tar.zst
          
          # 解压 .zst 格式
          mkdir sdk
          zstd -d sdk.tar.zst -o sdk.tar
          tar -xf sdk.tar -C sdk --strip-components=1
          rm sdk.tar sdk.tar.zst

      - name: Install Feeds & Golang Support
        run: |
          cd sdk
          echo "src-git lucky https://github.com/gdy666/luci-app-lucky.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install golang
          ./scripts/feeds install luci-compat

      - name: Configure & Compile Lucky APK
        run: |
          cd sdk
          echo "CONFIG_USE_APK=y" > .config
          echo "CONFIG_PACKAGE_lucky=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-lucky=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-lucky-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          
          make defconfig
          # 核心编译
          make package/lucky/compile V=s -j$(nproc) || make package/lucky/compile V=s -j1

      - name: Organize & Upload Artifacts
        if: success()
        run: |
          mkdir -p publish_apk
          find sdk/bin/ -name "*lucky*.apk" -exec cp {} publish_apk/ \;
          
      - name: Upload Lucky APK
        uses: actions/upload-artifact@v4
        with:
          name: Lucky-APK-IPQ6000-ARM64
          path: publish_apk/*
