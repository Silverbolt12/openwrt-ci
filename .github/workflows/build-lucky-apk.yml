name: Build Lucky APK for IPQ6000

on:
  workflow_dispatch: # 手动触发

env:
  BASE_URL: https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq60xx/
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization Environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils curl
          sudo timedatectl set-timezone "$TZ"

      - name: Setup OpenWrt SDK & Dynamic Link
        run: |
          # 1. 获取索引页数据
          echo "正在获取官方 SDK 列表..."
          INDEX_DATA=$(curl -sL ${{ env.BASE_URL }})
          
          # 2. 使用 sed 提取文件名 (匹配 <a> 标签之间的内容)
          # 逻辑：找包含 openwrt-sdk-qualcommax-ipq60xx 且以 .tar.xz 结尾的行
          SDK_NAME=$(echo "$INDEX_DATA" | sed -n 's/.*>\(openwrt-sdk-qualcommax-ipq60xx[^<]*\.tar\.xz\)<.*/\1/p' | head -n 1)

          if [ -z "$SDK_NAME" ]; then
            echo "错误：无法在页面中定位 SDK 文件名！"
            exit 1
          fi

          SDK_URL="${{ env.BASE_URL }}${SDK_NAME}"
          echo "成功找到最新 SDK: $SDK_URL"
          
          # 3. 下载并解压
          wget -q "$SDK_URL" -O sdk.tar.xz
          mkdir sdk && tar -xJf sdk.tar.xz -C sdk --strip-components=1

      - name: Install Feeds & Dependencies
        run: |
          cd sdk
          # 添加 Lucky 源码仓库
          echo "src-git lucky https://github.com/gdy666/luci-app-lucky.git" >> feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 核心依赖：Lucky(Go语言) 和 LuCI兼容层
          ./scripts/feeds install golang
          ./scripts/feeds install luci-compat

      - name: Configure & Compile Lucky APK
        run: |
          cd sdk
          # 1. 开启 APK 模式
          echo "CONFIG_USE_APK=y" > .config
          
          # 2. 选中 Lucky 及其插件和语言包
          echo "CONFIG_PACKAGE_lucky=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-lucky=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-lucky-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          
          # 3. 刷新依赖关系
          make defconfig
          
          # 4. 开始编译 (先尝试多线程，失败则转单线程详细输出)
          make package/lucky/compile V=s -j$(nproc) || make package/lucky/compile V=s -j1

      - name: Organize Artifacts
        if: success()
        run: |
          mkdir -p publish_apk
          # 自动搜寻编译出的 .apk 文件
          find sdk/bin/ -name "*lucky*.apk" -exec cp {} publish_apk/ \;
          
      - name: Upload Lucky APK
        uses: actions/upload-artifact@v4
        with:
          name: Lucky-APK-IPQ6000-Snapshot
          path: publish_apk/*
