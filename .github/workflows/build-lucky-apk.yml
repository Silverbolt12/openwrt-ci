- name: Install Feeds & Golang Support
        run: |
          cd sdk
          # 1. 添加 Lucky 源码
          echo "src-git lucky https://github.com/gdy666/luci-app-lucky.git" >> feeds.conf.default
          
          # 2. 更新并安装所有 Feeds (增加 luci 核心 feed 以便支持界面编译)
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 3. 显式安装必须的组件
          ./scripts/feeds install golang
          ./scripts/feeds install luci-base
          ./scripts/feeds install luci-compat

      - name: Configure & Compile Lucky APK
        run: |
          cd sdk
          # 开启 APK 模式
          echo "CONFIG_USE_APK=y" > .config
          
          # 强制选中所有相关包 (使用 =y 强制选中)
          # 注意：有些版本的 Makefile 包名可能带有前缀，我们多写几个兼容项
          cat >> .config <<EOF
          CONFIG_PACKAGE_lucky=y
          CONFIG_PACKAGE_luci-app-lucky=y
          CONFIG_PACKAGE_luci-i18n-lucky-zh-cn=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_golang=y
          EOF
          
          # 扩展：如果还是没出 luci-app，尝试通过脚本直接选中
          sed -i 's/p/y/g' .config 2>/dev/null || true
          
          make defconfig
          
          # 关键点：不再只编译 package/lucky，而是编译整个 lucky 目录下的所有包
          # 如果 lucky 源码里有多个文件夹（如 lucky 和 luci-app-lucky），这样能全部覆盖
          make package/feeds/lucky/luci-app-lucky/compile V=s -j$(nproc)
          make package/feeds/lucky/lucky/compile V=s -j$(nproc)

      - name: Organize & Upload Artifacts
        if: success()
        run: |
          mkdir -p publish_apk
          # 扩大搜索范围，寻找所有 .apk
          find sdk/bin/ -name "*.apk" -exec cp {} publish_apk/ \;
