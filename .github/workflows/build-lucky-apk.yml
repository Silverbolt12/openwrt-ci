name: Build Lucky APK for IPQ6000

on:
  workflow_dispatch: # 手动触发

env:
  SDK_URL: https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq60xx/openwrt-sdk-qualcommax-ipq60xx_gcc-14.2.0_musl.Linux-x86_64.tar.xz

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip qemu-utils

      - name: Setup OpenWrt SDK
        run: |
          wget $SDK_URL -O sdk.tar.xz
          mkdir sdk && tar -xJf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          # 添加 Lucky 源码 feed
          echo "src-git lucky https://github.com/gdy666/luci-app-lucky.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Build APK
        run: |
          cd sdk
          # 关键点：配置为 APK 模式并选中 Lucky
          echo "CONFIG_USE_APK=y" > .config
          echo "CONFIG_PACKAGE_lucky=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-lucky=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-lucky-zh-cn=y" >> .config
          
          make defconfig
          # 仅编译 Lucky 相关的包
          make package/lucky/compile V=s -j$(nproc)

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lucky-apk-ipq6000
          path: sdk/bin/packages/aarch64_cortex-a53/lucky/*.apk
